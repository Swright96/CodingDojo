<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1><strong>Registration Form</strong></h1>
    <div>
        <label>First Name: *</label>
        <input type="text" name="firstname">
    </div>
    <div>
        <label>Last Name: *</label>
        <input type="text" name="lastname">
    </div>
    <div>
        <label>Email Address: *</label>
        <input type="text" name="email">
    </div>
    <div>
        <label>Password: *</label>
        <input type="password" name="password">
    </div>
    <div>
        <label>Confirm Password: *</label>
        <input type="password" name="confirmpass">
    </div>
    <div>
        <label>Birthday:</label>
        <input type="date" name="birthday">
    </div>
    <div>
        Gender Identity:
    </div>
    <div>
        <label>Male</label>
        <input type="radio" name="Male" value="Male" id="Male">
        <label>Female</label>
        <input type="radio" name="Female" value="Female" id="Female">
        <label>Non-Binary</label>
        <input type="radio" name="non-binary" value="non-binary" id="non-binary">
        <label>I prefer not to answer</label>
        <input type="radio" name="I prefer not to answer" value="I prefer not to answer" id="noprefer">
    </div>
    <div>
        <label>Favorite Language: </label>
        <select name="Favorite Language: ">
            <option>JavaScript</option>
            <option>Python</option>
            <option>HTML</option>
        </select>
    </div>
    <div>
        A short descirption about myself:
    </div>
    <div>
        <textarea name="A short description about myself:" cols="20" rows="4"></textarea>
    </div>
    <div>
        <input type="checkbox" name="agree" id="agree" checked>
        <label for="agree">Yes, I would like to receive periodic email updates</label>
    </div>
    <div>
        <input type="submit" value="Create Account">
    </div>
    <div>
        * indicates a required field
    </div>
</body>
</html>
